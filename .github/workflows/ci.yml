name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.13"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint with Ruff
        run: |
          uv run ruff check . --output-format=github
          uv run ruff format --check .

      # Phase 2: Check architectural layer boundaries
      - name: Check layer boundaries
        run: uv run lint-imports

  type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.13"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Type check with Mypy
        run: uv run mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.13"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests with coverage
        run: |
          uv run pytest \
            -m "not requires_snowflake" \
            --cov=src/igloo_mcp \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      # Phase 3.6: Enforce critical module coverage
      - name: Check critical module coverage
        run: |
          uv run python scripts/check_critical_coverage.py \
            --coverage-file coverage.xml \
            --min-coverage 55 \
            --critical-modules "mcp/tools" "service_layer" "sql_validation.py"

      - name: Upload coverage to Codecov
        continue-on-error: true  # Don't fail CI if Codecov upload fails (token may not be configured)
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          curl https://keybase.io/codecovsecurity/pgp_keys.asc | gpg --no-default-keyring --keyring trustedkeys.gpg --import
          curl -Os https://cli.codecov.io/latest/linux/codecov
          curl -Os https://cli.codecov.io/latest/linux/codecov.SHA256SUM
          curl -Os https://cli.codecov.io/latest/linux/codecov.SHA256SUM.sig
          gpg --verify codecov.SHA256SUM.sig codecov.SHA256SUM
          shasum -a 256 -c codecov.SHA256SUM
          chmod +x codecov

          token_args=()
          if [ -n "${CODECOV_TOKEN:-}" ]; then
            token_args=(-t "$CODECOV_TOKEN")
          else
            echo "CODECOV_TOKEN is not configured; attempting tokenless upload."
          fi

          ./codecov --verbose upload-process --disable-search -f coverage.xml -F unittests "${token_args[@]}"
